<!DOCTYPE html>
<html>
<head>
    <title>Delete Doctor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 420px;
            text-align: center;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #dc3545;
            margin-bottom: 20px;
        }

        p {
            font-size: 16px;
            color: #333;
            margin-bottom: 25px;
        }

        .icon {
            font-size: 50px;
            color: #dc3545;
            margin-bottom: 10px;
        }

        /* Buttons */
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .delete-btn:hover {
            background: #a71d2a;
        }

        .cancel-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }

        .cancel-btn:hover {
            background: #495057;
        }

        /* Highlight doctor name */
        .name {
            color: #0077b6;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="box">

        <div class="icon">⚠️</div>

        <h2>Delete Doctor</h2>

        <p>Are you sure you want to delete <span class="name">{{ doctor.name }}</span>?</p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="delete-btn">Yes, Delete</button>
        </form>

        <br>

        <a href="{% url 'doctor_list' %}" class="cancel-btn">Cancel</a>

    </div>

</body>
</html>
