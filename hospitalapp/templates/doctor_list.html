<!DOCTYPE html>
<html>
<head>
    <title>Doctors</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        /* Header */
        h1 {
            background: #0077b6;
            color: white;
            padding: 15px;
            margin: 0;
            text-align: center;
        }

        /* Navigation */
        a {
            text-decoration: none;
        }

        .home-link {
            display: inline-block;
            margin: 15px;
            padding: 8px 15px;
            background: #023e8a;
            color: white;
            border-radius: 5px;
        }

        .home-link:hover {
            background: #03045e;
        }

        /* Search Box */
        form {
            text-align: center;
            margin: 20px;
        }

        input[type="text"] {
            padding: 10px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        button {
            padding: 10px 15px;
            background: #0077b6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #023e8a;
        }

        /* Table */
        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        th {
            background: #0096c7;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f1f1f1;
        }

        /* Edit & Delete Buttons */
        .edit-btn {
            padding: 6px 10px;
            background: #28a745;
            color: white;
            border-radius: 4px;
        }

        .delete-btn {
            padding: 6px 10px;
            background: #dc3545;
            color: white;
            border-radius: 4px;
        }

        .edit-btn:hover {
            background: #1e7e34;
        }

        .delete-btn:hover {
            background: #a71d2a;
        }

        /* Responsive */
        @media (max-width: 600px) {
            input[type="text"] {
                width: 80%;
            }

            table {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <h1>Doctor List</h1>

    <a href="{% url 'home' %}" class="home-link">Home</a>

    <form method="GET">
        <input type="text" name="search" placeholder="Search Doctor or Specialization">
        <button type="submit">Search</button>
    </form>

    <table>
        <tr>
            <th>Name</th>
            <th>Specialization</th>
            <th>Experience</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>

        {% for doctor in doctors %}
        <tr>
            <td>{{ doctor.name }}</td>
            <td>{{ doctor.specialization }}</td>
            <td>{{ doctor.experience }}</td>
            <td>
                <a href="{% url 'edit_doctor' doctor.id %}" class="edit-btn">Edit</a>
            </td>
            <td>
                <a href="{% url 'delete_doctor' doctor.id %}" class="delete-btn">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
